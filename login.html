<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — CodeLearn</title>
  <link rel="icon" type="image/png" href="main ico.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050d1a;
      --surface: #0b1628;
      --card: #101e35;
      --blue: #2563eb;
      --cyan: #06b6d4;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e8f0fe;
      --muted: #7a90b0;
      --border: rgba(37,99,235,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding: 5rem 1rem 2rem;
    }

    /* ── BACKGROUND ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }

    .bg-glow-left {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
      top: 50%; left: -100px; transform: translateY(-50%);
      pointer-events: none;
    }

    .bg-glow-right {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
      top: 20%; right: -50px;
      pointer-events: none;
    }

    /* ── FLOATING PARTICLES ── */
    .particles {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: .6; }
      90% { opacity: .3; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── MAIN CARD ── */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(6,182,212,0.05);
      animation: slideUp .5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .card-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-mark {
      display: inline-flex;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 14px;
      align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: .75rem;
      box-shadow: 0 8px 24px rgba(6,182,212,0.25);
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem; font-weight: 800;
      color: var(--cyan);
    }
    .logo-name span { color: var(--green); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem; font-weight: 800;
      text-align: center;
      margin-bottom: .35rem;
    }
    .card-sub {
      text-align: center;
      color: var(--muted); font-size: .88rem;
      margin-bottom: 2rem;
    }
    .card-sub a {
      color: var(--cyan); text-decoration: none; font-weight: 500;
    }
    .card-sub a:hover { text-decoration: underline; }

    /* ── TABS ── */
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      gap: 4px;
    }
    .tab {
      padding: .6rem;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: .87rem; font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .tab.active {
      background: var(--surface);
      color: var(--cyan);
      border: 1px solid rgba(6,182,212,0.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── FIELDS ── */
    .field {
      display: flex; flex-direction: column; gap: .4rem;
      margin-bottom: 1.1rem;
    }
    .field-top {
      display: flex; justify-content: space-between; align-items: center;
    }
    .field label {
      font-size: .78rem; font-weight: 600;
      color: var(--muted);
      letter-spacing: .4px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .forgot-link {
      font-size: .78rem; color: var(--cyan);
      text-decoration: none;
      font-family: 'Space Mono', monospace;
    }
    .forgot-link:hover { text-decoration: underline; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      font-size: .95rem; pointer-events: none;
      color: var(--muted); transition: color .2s;
    }
    .toggle-pw {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .85rem;
      padding: 0; transition: color .2s;
    }
    .toggle-pw:hover { color: var(--cyan); }

    input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: .78rem .9rem .78rem 2.55rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
    }
    input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }

    /* ── REMEMBER ME ── */
    .remember {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 1.5rem;
    }
    .remember input[type="checkbox"] {
      width: 16px; height: 16px; min-width: 16px;
      padding: 0; border-radius: 4px; cursor: pointer;
    }
    .remember label {
      font-size: .83rem; color: var(--muted); cursor: pointer;
      text-transform: none; letter-spacing: 0;
      font-family: 'Inter', sans-serif; font-weight: 400;
    }

    /* ── ERROR BANNER ── */
    .error-banner {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .84rem;
      color: #fca5a5;
      margin-bottom: 1.2rem;
      align-items: center; gap: .6rem;
    }
    .error-banner.show { display: flex; }

    /* ── SUBMIT ── */
    .login-btn {
      width: 100%;
      padding: .95rem;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border: none; border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .3px;
      position: relative; overflow: hidden;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6,182,212,0.28);
    }
    .login-btn:active { transform: translateY(0); }
    .login-btn.loading { pointer-events: none; opacity: .8; }
    .login-btn .btn-text { transition: opacity .2s; }
    .login-btn .spinner {
      display: none;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .login-btn.loading .btn-text { opacity: 0; }
    .login-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── DIVIDER ── */
    .or-divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.25rem 0;
    }
    .or-line { flex: 1; height: 1px; background: var(--border); }
    .or-text {
      color: var(--muted); font-size: .78rem;
      font-family: 'Space Mono', monospace;
    }

    /* ── GOOGLE ── */
    .google-btn {
      width: 100%;
      padding: .85rem;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .9rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .65rem;
      transition: all .2s;
    }
    .google-btn:hover { border-color: rgba(6,182,212,0.4); transform: translateY(-1px); }

    /* ── SUCCESS ── */
    .success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1rem 0;
    }
    .success-view.show { display: flex; }
    .login-form.hidden { display: none; }

    .success-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(34,197,94,0.08);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin-bottom: 1.25rem;
      animation: popIn .4s ease both;
    }
    @keyframes popIn {
      from { transform: scale(.4); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--green); margin-bottom: .5rem;
    }
    .success-sub {
      color: var(--muted); font-size: .88rem;
      line-height: 1.6; max-width: 300px;
    }
    .dashboard-btn {
      margin-top: 1.5rem;
      padding: .75rem 2rem;
      background: var(--green);
      border: none; border-radius: 9px;
      color: #000; font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .2s;
    }
    .dashboard-btn:hover { background: #16a34a; transform: translateY(-2px); }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed; top: 1.5rem; left: 1.5rem;
      z-index: 20;
      display: flex; align-items: center; gap: .5rem;
      color: var(--muted); font-size: .85rem;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      transition: color .2s;
    }
    .back-link:hover { color: var(--cyan); }

    @media (max-width: 520px) {
      .login-card { margin: 1rem; padding: 2rem 1.5rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow-left"></div>
<div class="bg-glow-right"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Back to home -->
<a href="home2.html" class="back-link">← Home</a>

<!-- LOGIN CARD -->
<div class="login-card">

  <div class="card-logo">
    <div class="logo-mark">🚀</div>
    <div class="logo-name">Code<span>Learn</span></div>
  </div>

  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Don't have an account? <a href="signup.html">Sign up free</a></p>

  <!-- Role tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this)" type="button"> Student</button>
    <button class="tab" onclick="switchTab(this)" type="button">Teacher</button>
  </div>

  <!-- Form -->
  <div class="login-form" id="loginForm">

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner">
      ⚠️ <span id="errorMsg">Incorrect email or password. Please try again.</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="emailInput" placeholder=""/>
        <span class="input-icon"></span>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-top">
        <label>Password</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-wrap">
        <input type="password" id="pwInput" placeholder=""/>
        <span class="input-icon"></span>
        <button class="toggle-pw" type="button" onclick="togglePw()" id="toggleBtn">👁</button>
      </div>
    </div>

    <!-- Remember me -->
    <div class="remember">
      <input type="checkbox" id="rememberMe"/>
      <label for="rememberMe">Keep me logged in</label>
    </div>

    <!-- Login button -->
    <button class="login-btn" id="loginBtn" onclick="window.location.href='dashboard.html'" type="button">
      <span class="btn-text">Log In →</span>
      <div class="spinner"></div>
    </button>

    <div class="or-divider">
      <div class="or-line"></div>
      <div class="or-text">or</div>
      <div class="or-line"></div>
    </div>

    <button class="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

  </div>

  <!-- Success view -->
  <div class="success-view" id="successView">
    <div class="success-ring">✓</div>
    <div class="success-title">You're logged in!</div>
    <p class="success-sub">Welcome back to CodeLearn. Your learning streak is waiting for you.</p>
    <button class="dashboard-btn" type="button" onclick="">Go to Dashboard →</button>
  </div>

</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() > .5 ? 2 : 3}px;
      height: ${Math.random() > .5 ? 2 : 3}px;
      animation-duration: ${6 + Math.random() * 10}s;
      animation-delay: ${Math.random() * 8}s;
      opacity: ${0.3 + Math.random() * 0.4};
    `;
    container.appendChild(p);
  }

  function switchTab(btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const btn = document.getElementById('toggleBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  function handleLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pw = document.getElementById('pwInput').value;
    const banner = document.getElementById('errorBanner');
    const btn = document.getElementById('loginBtn');

    // Clear errors
    banner.classList.remove('show');
    document.getElementById('emailInput').classList.remove('error');
    document.getElementById('pwInput').classList.remove('error');

    // Validate
    if (!email || !pw) {
      document.getElementById('errorMsg').textContent = 'Please enter your email and password.';
      banner.classList.add('show');
      if (!email) document.getElementById('emailInput').classList.add('error');
      if (!pw) document.getElementById('pwInput').classList.add('error');
      return;
    }

    // Loading state
    btn.classList.add('loading');

    // Simulate login (replace with real auth)
    setTimeout(() => {
      btn.classList.remove('loading');
      // For demo: any valid-looking input succeeds
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('successView').classList.add('show');
    }, 1500);
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
